name: Fixed Hourly Stock Scan
on:
  schedule:
    # Indian Time ke hisaab se roz subah 9:30 baje chalu hoga
    - cron: '00 04 * * 1-5'
  workflow_dispatch: # Manual button ke liye

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 0 se lekar 420 minutes (7 ghante) ka delay
        delay: [0, 60, 120, 180, 240, 300, 360, 420]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Wait for Hourly Slot
        # Bash ka sahi tareeka calculator use karne ka taaki error na aaye
        run: |
          MINUTES=${{ matrix.delay }}
          SECONDS=$((MINUTES * 60))
          echo "Waiting for $SECONDS seconds before running the bot..."
          sleep $SECONDS
        
      - name: Run Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot.py

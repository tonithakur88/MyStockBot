name: Fixed Hourly Stock Scan
on:
  schedule:
    # Indian Time ke hisaab se roz subah 9:30 baje GitHub ek baar jagega
    - cron: '00 04 * * 1-5'
  workflow_dispatch: # Manual chalu karne ke liye

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Ye hain tere har ghante ke offsets (0 min, 60 min, 120 min, 180 min...)
        delay: [0, 60, 120, 180, 240, 300, 360, 420]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Wait for Hourly Slot
        # Ye command code ko uske sahi ghante tak rok kar rakhegi
        run: sleep $(( ${{ matrix.delay }} * 60 ))
        
      - name: Run Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot.py

name: Continuous Loop Stock Scan
on:
  workflow_dispatch: # Sirf manual run karne ke liye

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run Background Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        # GitHub action ko 6 ghante (21600 seconds) tak lagatar chalu rakhne ka system
        run: timeout 21600 python bot.py || true

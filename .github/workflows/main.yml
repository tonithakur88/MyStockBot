name: Daily Stock Scan
on:
  schedule:
    - cron: '30 10 * * 1-5' # Ye Indian time ke hisaab se market hours mein chalega
  workflow_dispatch: # Isse tu manually bhi chala sakta hai

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot.py
